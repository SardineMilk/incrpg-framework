<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IncRPG</title>
    <link rel="shortcut icon" type="image/png" href="resources/rat.png">

    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="game-container">
        <header>
        </header>

        <main class="game-screen">
            <div class="hero-box">
                <div class="name-box">Hero</div>
                <div class="xp-bar">XP</div>
                <div class="status-box">
                    <div class="health-bar" id="health-bar">HP</div>
                    <div class="stamina-bar" id="stamina-bar">SP</div>
                    <div class="mental-bar" id="mental-bar">MP</div>
                </div>
                <div class="stats-box" id="stats-box">
                    <!-- 4 physical, 4 mental. Power, Resilience, Speed, Accuracy -->
                    <!-- Current numbers and progress injected by JS -->
                </div>
                <div class="money-box" id="money-box">Gold</div>
                <div class="effects-box">Active Effects</div>
            </div>
            
            <div class="skills-box">
                <!-- Current visible skills injected here -->
                <!-- Skills become visible after 50% of progress to level 1-->
            </div>

            <div class="actions-box">
                <!-- Available actions injected here -->
            </div>

            <div class="tasks-box">
                <!-- Current tasks injected here-->
            </div>

            <div id="log-box">
                <!-- Log of events -->
            </div>

        </main>

        <footer>
            <p>SardineMilk</p>
        </footer>
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
